name: Update Latest Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board:
          - 36LJU22
          - RP2040_ZERO
          - 38LJE24
          # - 11XGA24_1
          # - 11XGA24_2
          - LEO_V2
          - LEO_V3
          - LEO_V3_2040BT
          # - 09LJV23

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install PlatformIO
        run: |
          pip install platformio

      - name: Extract firmware version
        id: fw_version
        run: |
          BASE_VERSION=$(grep -oP '#define FW_VER "\K[^"]+' src/g_config.h)
          FULL_VERSION="${BASE_VERSION}-ino"
          VERSION_NO_V="${FULL_VERSION#v}"
          echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "version_no_v=$VERSION_NO_V" >> $GITHUB_OUTPUT
          echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT

      - name: Build firmware
        run: |
          export PLATFORMIO_BUILD_FLAGS='-DFW_VER="\"${{ steps.fw_version.outputs.version }}\""'
          pio run --environment ${{ matrix.board }}

      - name: Rename firmware for release
        run: |
          VERSION_NO_V="${{ steps.fw_version.outputs.version_no_v }}"
          BUILD_DIR=".pio/build/${{ matrix.board }}"

          if [ ! -f "${BUILD_DIR}/firmware.uf2" ]; then
            if [ -f "${BUILD_DIR}/firmware.elf" ]; then
              echo "firmware.uf2 missing, generating from firmware.elf"
              pio pkg exec -p tool-picotool-rp2040-earlephilhower -- \
                picotool uf2 convert -t elf "${BUILD_DIR}/firmware.elf" "${BUILD_DIR}/firmware.uf2"
            fi
          fi

          if [ ! -f "${BUILD_DIR}/firmware.uf2" ]; then
            echo "::error::Expected UF2 artifact not found for ${{ matrix.board }}"
            ls -la "${BUILD_DIR}" || true
            exit 1
          fi

          mv "${BUILD_DIR}/firmware.uf2" "ZX_RGBI_TO_VGA_HDMI-${{ matrix.board }}-${VERSION_NO_V}.uf2"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: fw-${{ matrix.board }}
          path: "*.uf2"
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract firmware version
        id: fw_version
        run: |
          BASE_VERSION=$(grep -oP '#define FW_VER "\K[^"]+' src/g_config.h)
          FULL_VERSION="${BASE_VERSION}-ino"
          echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: firmware
          pattern: fw-*
          merge-multiple: true

      - name: List firmware files
        run: ls -la firmware/

      - name: Update latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push -f origin latest

      - name: Delete previous firmware assets
        run: |
          gh release view latest --json assets --jq '.assets[].name' 2>/dev/null | \
            grep '\.uf2$' | \
            while read -r asset; do
              echo "Deleting old asset: $asset"
              gh release delete-asset latest "$asset" --yes
            done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Development Build (${{ steps.fw_version.outputs.base_version }})
          body: |
            This is an automatically updated release that always points to the latest commit on the main branch.
            
            **Firmware Version:** ${{ steps.fw_version.outputs.version }}
            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}
            **Message:** ${{ github.event.head_commit.message }}
            
            ### Board Variants
            Each `.uf2` file is named `ZX_RGBI_TO_VGA_HDMI-<board>-<version>.uf2`.
            Download the file matching your board revision.
            
            ### Installation
            1. Download the `.uf2` file for your board
            2. Hold the BOOTSEL button on your Raspberry Pi Pico while connecting USB
            3. Drag and drop the `.uf2` file onto the RPI-RP2 drive
            
            To clone this version:
            ```bash
            git clone --branch latest https://github.com/${{ github.repository }}.git
            ```
          draft: false
          prerelease: false
          files: firmware/*.uf2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
