[platformio]
default_envs =
  36LJU22
  ; RP2040_ZERO
  ; 38LJE24
  ; 11XGA24_1
  ; 11XGA24_2
  ; LEOV3
  ; LEOV3_2040BT
  ; 09LJV23

[env]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
platform_packages = framework-arduinopico@https://github.com/earlephilhower/arduino-pico.git#5.6.0
board = rpipico ; rpipico2 ; 
framework = arduino
board_build.core = earlephilhower
build_flags =
  -O3
  -I src
  -I src/video
  -I src/osd
  -I src/i2c
  -I src/kbd
  -I src/usb
build_unflags =
  -Os
  -D PICO_STDIO_UART

[env_osd_menu]
build_flags =
  -D OSD_MENU_ENABLE

[env_osd_ff]
build_flags =
  -D OSD_FF_ENABLE

[env_serial]
build_flags =
  -D PICO_STDIO_USB
  -D SERIAL_MENU_ENABLE

[env_ps2_kbd]
build_flags =
  -D PS2_KBD_ENABLE

[env_usb_kbd]
build_flags =
  ; USB Host mode (USB keyboard): enable USB_KBD_ENABLE + NO_USB, disable PICO_STDIO_USB
  ; USB Device mode (Serial): enable PICO_STDIO_USB, disable USB_KBD_ENABLE + NO_USB
  -D USB_KBD_ENABLE
  -D NO_USB
  -D CFG_TUSB_CONFIG_FILE=\"tusb_config_host.h\"
  -I $PROJECT_PACKAGES_DIR/framework-arduinopico/pico-sdk/lib/tinyusb/src
build_unflags =
  -D PICO_STDIO_USB

[env:36LJU22]
lib_archive = no
build_src_filter =
  +<*>
  -<kbd/>
  -<usb/>
build_flags = 
  -D BOARD_36LJU22
  ${env.build_flags}
  ${env_osd_menu.build_flags}
  ${env_osd_ff.build_flags}
  ${env_serial.build_flags}
build_unflags =
  ${env.build_unflags}

