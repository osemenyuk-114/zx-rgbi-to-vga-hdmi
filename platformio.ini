[platformio]
default_envs = ff_osd ; no_osd ; osd_menu ;  
src_dir = ZX_RGBI_TO_VGA_HDMI

[env]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
platform_packages = framework-arduinopico@https://github.com/earlephilhower/arduino-pico.git#5.5.0
board = pico
framework = arduino
board_build.core = earlephilhower
build_flags =                           
  -O3
  -D PICO_STDIO_USB
build_unflags = 
  -Os
  -D PICO_STDIO_UART
build_src_filter =
  +<**/*.ino>
  +<**/*.cpp>
  +<**/*.c>

[env:no_osd]
build_src_filter =
  ${env.build_src_filter}
  -<**/osd.c>
  -<**/osd_menu.c>
  -<**/ff_osd.c>

[env:osd_menu]
build_flags =
  ${env.build_flags}
  -D OSD_ENABLE
  -D OSD_MENU_ENABLE
build_src_filter =
  ${env.build_src_filter}
  -<**/ff_osd.c>

[env:ff_osd]
lib_deps = https://github.com/vmilea/pico_i2c_slave.git
lib_archive = no
build_flags =
  ${env.build_flags}
  -D OSD_ENABLE
  -D OSD_FF_ENABLE
build_src_filter =
  ${env.build_src_filter}
  -<**/osd_menu.c>
