[platformio]
default_envs =
  osd
  ; ff-osd
  ; osd-menu
  ; no-osd

[env]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
platform_packages = framework-arduinopico@https://github.com/earlephilhower/arduino-pico.git#5.6.0
board = pico
framework = arduino
board_build.core = earlephilhower
build_flags =
  -D BOARD_36LJU22
  ; -D BOARD_38LJE24
  ; -D BOARD_11XGA24
  ; -D BOARD_25LEO25
  ; -D BOARD_09LJV23
  -O3
  -I src
  -I src/video
  -I src/osd
  -I src/i2c
build_unflags =
  -Os
  -D PICO_STDIO_UART

[env_serial]
build_flags =
  ${env.build_flags}
  -D PICO_STDIO_USB
  -D SERIAL_MENU_ENABLE
build_unflags =
  ${env.build_unflags}
  ; -D PICO_STDIO_USB

[env:no-osd]
build_src_filter =
  +<*>
  -<osd/>
  -<i2c/>
build_flags =
  ${env.build_flags}
  -D PICO_STDIO_USB
  -D SERIAL_MENU_ENABLE
build_unflags =
  ${env.build_unflags}

[env:osd-menu]
build_src_filter =
  +<*>
  -<osd/ff_osd.c>
  -<i2c/>
build_flags =
  ${env_serial.build_flags}
  -D OSD_MENU_ENABLE
build_unflags =
  ${env_serial.build_unflags}

[env:ff-osd]
lib_archive = no
build_src_filter =
  +<*>
  -<osd/osd_menu.c>
build_flags =
  ${env_serial.build_flags}
  -D OSD_FF_ENABLE
build_unflags =
  ${env_serial.build_unflags}

[env:osd]
lib_archive = no
build_flags =
  ${env_serial.build_flags}
  -D OSD_MENU_ENABLE
  -D OSD_FF_ENABLE
build_unflags =
  ${env_serial.build_unflags}
